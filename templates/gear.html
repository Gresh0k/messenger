<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keepy - Шестеренка</title>
    <style>
        :root {
            --bg-1: #101114;
            --bg-2: #1a1c20;
            --gear-flat: #9ca3af;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            font-family: "Segoe UI", sans-serif;
            background: radial-gradient(circle at center, var(--bg-2), var(--bg-1));
        }

        .screen {
            width: 100vw;
            height: 100vh;
            display: grid;
            place-items: center;
            position: relative;
        }

        .gear {
            width: min(68vmin, 620px);
            aspect-ratio: 1 / 1;
            filter: drop-shadow(0 18px 22px rgba(0, 0, 0, 0.35));
        }
        .gear svg { width: 100%; height: 100%; display: block; }

        .hint {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            color: #9ca3af;
            font-size: 14px;
            letter-spacing: 0.3px;
            opacity: 0.88;
        }
    </style>
</head>
<body>
    <main class="screen">
        <section class="gear" aria-label="Шестеренка">
            <svg viewBox="0 0 512 512" role="img" aria-label="Серая шестеренка">
                <g transform="translate(256 256)">
                    <g fill="var(--gear-flat)">
                        <rect x="-26" y="-242" width="52" height="86" rx="12"/>
                        <rect x="-26" y="-242" width="52" height="86" rx="12" transform="rotate(45)"/>
                        <rect x="-26" y="-242" width="52" height="86" rx="12" transform="rotate(90)"/>
                        <rect x="-26" y="-242" width="52" height="86" rx="12" transform="rotate(135)"/>
                        <rect x="-26" y="-242" width="52" height="86" rx="12" transform="rotate(180)"/>
                        <rect x="-26" y="-242" width="52" height="86" rx="12" transform="rotate(225)"/>
                        <rect x="-26" y="-242" width="52" height="86" rx="12" transform="rotate(270)"/>
                        <rect x="-26" y="-242" width="52" height="86" rx="12" transform="rotate(315)"/>
                    </g>
                    <circle r="166" fill="var(--gear-flat)"/>
                    <circle r="74" fill="var(--bg-2)"/>
                </g>
            </svg>
        </section>
        <div class="hint">/gear</div>
    </main>
</body>
</html>
