<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keepy - Ваш профиль</title>
    <!-- Подключаем ваш существующий стиль -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <style>
        /* 
           ДОПОЛНИТЕЛЬНЫЕ СТИЛИ ДЛЯ СТРАНИЦЫ ПРОФИЛЯ (как на фото)
           Добавлены поверх вашего style.css
        */

        /* Сброс стилей body для этой конкретной страницы, чтобы сделать её темной и на весь экран */
        body.profile-page {
            background-color: #121212; /* Темный фон как на фото */
            color: #ffffff;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden; /* Чтобы не было скролла, если контент влезает */
        }

        /* Верхняя панель (Header) */
        .app-header {
            background-color: #2c2c2c; /* Цвет шапки */
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-logo-img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #fff; /* Заглушка для лого */
            object-fit: cover;
        }

        .header-title {
            font-size: 24px;
            font-weight: 600;
            color: #fff;
        }

        .header-center-title {
            font-size: 22px;
            font-weight: 500;
            color: #fff;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Основной контейнер контента */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
            position: relative;
            /* Декоративный фон с геометрическими фигурами (имитация через CSS градиенты/паттерны или картинку) */
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect fill="%23121212" width="100" height="100"/><path d="M10 10 L20 10 L15 20 Z" fill="%23333" opacity="0.3"/><circle cx="80" cy="20" r="5" fill="%23333" opacity="0.3"/><rect x="40" y="80" width="10" height="10" fill="%23333" opacity="0.3" transform="rotate(45 45 85)"/></svg>');
            background-size: 200px 200px;
        }

        /* Блок информации о пользователе */
        .user-info-wrapper {
            display: flex;
            align-items: flex-start;
            gap: 30px;
            margin-bottom: 30px;
            padding: 0 20px;
            max-width: 800px;
            width: 100%;
        }

        .avatar-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-color: #ccc; /* Серый круг как на фото */
            border: 4px solid #121212; /* Обводка под цвет фона */
            object-fit: cover;
        }

        .online-status {
            font-size: 16px;
            color: #fff;
            font-weight: 500;
        }

        .user-details-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 120px; /* Высота аватара */
        }

        .user-name-large {
            font-size: 28px;
            font-weight: bold;
            line-height: 1.2;
            margin-bottom: 20px;
        }

        .edit-profile-btn {
            background: transparent;
            border: none;
            color: #aaa;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-left: auto; /* Прижать вправо */
            transition: color 0.2s;
        }
        
        .edit-profile-btn:hover {
            color: #fff;
        }

        .edit-icon {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        /* Карточка с данными */
        .data-card {
            background-color: #2c2c2c; /* Темно-серый фон карточки */
            border-radius: 25px; /* Сильное скругление */
            padding: 0;
            width: 100%;
            max-width: 700px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin-bottom: 40px;
        }

        .data-row {
            padding: 15px 25px;
            border-bottom: 1px solid #121212; /* Разделитель */
            display: flex;
            flex-direction: column;
        }

        .data-row:last-child {
            border-bottom: none;
        }

        .data-label {
            font-size: 14px;
            color: #ccc;
            margin-bottom: 4px;
            text-transform: lowercase; /* Как на фото: "мобильный", "почта" */
        }

        .data-value {
            font-size: 18px;
            color: #a5b4fc; /* Светло-фиолетовый/голубой оттенок текста данных */
            font-weight: 500;
            word-break: break-all;
        }
        
        /* Специальный стиль для даты рождения, чтобы соответствовать фото */
        .data-value.birthdate {
            color: #fff; /* На фото дата белая, или очень светлая */
            font-size: 18px;
        }

        /* Нижняя навигация (Tab Bar) */
        .bottom-nav {
            background-color: #2c2c2c;
            height: 70px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #3d3d3d;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #888;
            text-decoration: none;
            font-size: 12px;
            gap: 4px;
            width: 25%;
            height: 100%;
            transition: background 0.2s, color 0.2s;
        }

        .nav-item:hover {
            background-color: #3d3d3d;
            color: #fff;
        }

        .nav-item.active {
            color: #fff;
        }

        .nav-icon {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        /* Адаптивность для мобильных устройств */
        @media (max-width: 600px) {
            .user-info-wrapper {
                flex-direction: column;
                align-items: center;
                text-align: center;
                gap: 10px;
            }
            
            .user-details-right {
                height: auto;
                align-items: center;
            }

            .edit-profile-btn {
                margin-left: 0;
                margin-top: 10px;
            }

            .header-center-title {
                display: none; /* Скрываем центральный заголовок на маленьких экранах, если мешает */
            }
            
            .data-card {
                margin: 0 10px 40px 10px;
            }
        }
    </style>
</head>
<body class="profile-page">

    <!-- Верхняя панель -->
    <header class="app-header">
        <div class="header-left">
            <!-- Замените src на путь к вашему логотипу -->
            <img src="https://via.placeholder.com/40/ffffff/000000?text=K" alt="Logo" class="header-logo-img">
            <span class="header-title">Keepy</span>
        </div>
        <div class="header-center-title">Ваш профиль</div>
        <div><!-- Пустой блок для баланса flex --></div>
    </header>

    <!-- Основной контент -->
    <main class="main-content">
        
        <!-- Блок с аватаром и именем -->
        <div class="user-info-wrapper">
            <div class="avatar-container">
                <!-- Замените src на путь к аватару пользователя -->
                <img src="https://via.placeholder.com/120/cccccc/333333?text=User" alt="Avatar" class="user-avatar">
                <span class="online-status">В сети</span>
            </div>
            
            <div class="user-details-right">
                <div class="user-name-large">
                    Имя<br>Фамилия
                </div>
                <button class="edit-profile-btn">
                    <!-- Иконка карандаша (SVG) -->
                    <svg class="edit-icon" viewBox="0 0 24 24">
                        <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
                    </svg>
                    Редактировать профиль
                </button>
            </div>
        </div>

        <!-- Карточка с данными -->
        <div class="data-card">
            <div class="data-row">
                <span class="data-label">мобильный</span>
                <span class="data-value">+7 800-555-35-35</span>
            </div>
            <div class="data-row">
                <span class="data-label">имя пользователя</span>
                <span class="data-value">@gasvs</span>
            </div>
            <div class="data-row">
                <span class="data-label">почта</span>
                <span class="data-value">sdfsdf@mail.ru</span>
            </div>
            <div class="data-row">
                <span class="data-label">день рождения</span>
                <span class="data-value birthdate">10 май 2007 (18 лет)</span>
            </div>
        </div>

    </main>

    <!-- Нижняя навигация -->
    <nav class="bottom-nav">
        <a href="#" class="nav-item active">
            <svg class="nav-icon" viewBox="0 0 24 24">
                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
            <span>Профиль</span>
        </a>
        <a href="#" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24">
                <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z" fill="none" stroke="currentColor" stroke-width="2"/>
            </svg>
            <span>Избранное</span>
        </a>
        <a href="#" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24">
                <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z" fill="none" stroke="currentColor" stroke-width="2"/>
            </svg>
            <span>Чаты</span>
        </a>
        <a href="#" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24">
                <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L5.09 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.04.64.09.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
            </svg>
            <span>Настройки</span>
        </a>
    </nav>

</body>
</html>
