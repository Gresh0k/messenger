<!DOCTYPE html>
<html>
<head>
    <title>Keepy</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="brand">
            <img
                src="{{ url_for('static', filename='images/logo.png') }}"
                alt="KEEPY logo"
                class="brand-logo"
                onerror="if(!this.dataset.fallback1){this.dataset.fallback1='1';this.src='{{ url_for('static', filename='img/logo.png') }}';}else if(!this.dataset.fallback2){this.dataset.fallback2='1';this.src='{{ url_for('static', filename='logo.png') }}';}else{this.style.display='none';}"
            >
            <span class="logo">KEEPY</span>
        </a>
        <div>
            {% if session.user_id %}
                <span>{{ session.username }}</span> | <a href="/logout">Выйти</a>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        {% with messages = get_flashed_messages() %}
            {% if messages %}{% for m in messages %}<div class="flash">{{ m }}</div>{% endfor %}{% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
