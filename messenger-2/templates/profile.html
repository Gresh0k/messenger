{% extends "base.html" %}
{% block content %}
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0f172a;
            background-image: url("/static/images/background_on_site.jpg"), url("/static/background_on_site.jpg");
            background-position: center center;
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #ffffff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 30px 20px 100px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            zoom: 1.12;
        }

        /* Profile Top */
        .profile-top {
            display: flex;
            align-items: flex-start;
            gap: 25px;
            margin-bottom: 30px;
            padding: 0 10px;
        }

        .avatar-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 100px; height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex; align-items: center; justify-content: center;
            font-size: 42px; font-weight: 700; color: #fff;
            border: 3px solid rgba(255,255,255,0.1);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            flex-shrink: 0;
        }
        .user-avatar:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .user-avatar img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .user-avatar.has-img img { display: block; }
        .user-avatar.has-img .avatar-initials { display: none; }

        .online-status {
            font-size: 13px; color: #4CAF50; font-weight: 500;
            background: rgba(76, 175, 80, 0.15);
            padding: 4px 12px;
            border-radius: 12px;
        }

        .name-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-top: 10px;
        }

        .user-name-large {
            font-size: 28px; font-weight: 700; line-height: 1.2;
            margin-bottom: 12px;
        }

        .edit-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #aaa;
            font-size: 14px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 8px;
            transition: 0.2s;
            width: fit-content;
        }
        .edit-btn:hover {
            color: #fff;
            background: rgba(255,255,255,0.2);
        }
        .edit-icon { width: 16px; height: 16px; fill: currentColor; }

        /* Compact Info Cards */
        .info-section { margin-bottom: 20px; }

        .compact-card {
            background: rgba(30, 30, 30, 0.9);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            margin-bottom: 15px;
            transition: transform 0.2s;
        }
        .compact-card:hover { transform: translateY(-2px); }

        .compact-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .compact-row:last-child { border-bottom: none; }

        .compact-label {
            font-size: 13px;
            color: #888;
            text-transform: lowercase;
            letter-spacing: 0.5px;
        }
        .compact-value {
            font-size: 16px;
            color: #a5b4fc;
            font-weight: 500;
            word-break: break-word;
        }
        .compact-value.white { color: #fff; }

        /* About Section */
        .about-card {
            background: rgba(30, 30, 30, 0.9);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            margin-bottom: 15px;
            display: none;
        }
        .about-card.visible { display: block; }
        .about-label { font-size: 13px; color: #888; margin-bottom: 8px; }
        .about-text { color: #fff; font-size: 15px; line-height: 1.5; }

        /* Edit Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            justify-content: center;
            align-items: flex-end;
        }
        @media(min-width: 600px) { .modal-overlay { align-items: center; } }
        .modal-overlay.active { display: flex; }

        .modal-content {
            background: #1a1a1a;
            width: 100%;
            max-width: 550px;
            max-height: 90vh;
            border-radius: 24px 24px 0 0;
            padding: 30px;
            overflow-y: auto;
            position: relative;
            animation: slideUp 0.3s ease;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
        }
        @media(min-width: 600px) { .modal-content { border-radius: 24px; } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .modal-title { font-size: 24px; font-weight: 600; color: #fff; }
        .close-modal {
            background: none;
            border: none;
            color: #888;
            font-size: 32px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: 0.2s;
        }
        .close-modal:hover { background: rgba(255,255,255,0.1); color: #fff; }

        /* Photo Carousel - Telegram Style */
        .photo-carousel {
            margin-bottom: 30px;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
        }

        .carousel-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            max-height: 280px;
            overflow: hidden;
            cursor: pointer;
        }

        .carousel-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.35s ease;
        }

        .carousel-slide.hidden {
            transform: scale(0.85);
            opacity: 0;
            pointer-events: none;
        }

        .carousel-slide .slide-initials {
            font-size: 80px;
            font-weight: 700;
            color: rgba(255,255,255,0.8);
            text-transform: uppercase;
        }

        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .carousel-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            background: rgba(0,0,0,0.55);
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            z-index: 10;
            backdrop-filter: blur(4px);
        }
        .carousel-arrow:hover {
            background: rgba(0,0,0,0.75);
            transform: translateY(-50%) scale(1.1);
        }
        .carousel-arrow.left { left: 12px; }
        .carousel-arrow.right { right: 12px; }
        .carousel-arrow.hidden { display: none; }

        .carousel-counter {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.55);
            color: #fff;
            font-size: 13px;
            padding: 4px 14px;
            border-radius: 12px;
            backdrop-filter: blur(4px);
            z-index: 10;
        }

        .carousel-actions {
            display: flex;
            justify-content: center;
            gap: 24px;
            padding: 16px;
            flex-wrap: wrap;
        }

        .carousel-action-btn {
            background: none;
            border: none;
            color: #a5b4fc;
            font-size: 14px;
            cursor: pointer;
            text-decoration: underline;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .carousel-action-btn:hover { color: #fff; }
        .carousel-action-btn.danger { color: #e74c3c; }
        .carousel-action-btn.danger:hover { color: #ff6b6b; }

        .carousel-action-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        #avatarInput, #galleryInput { display: none; }

        /* Form Inputs */
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; color: #888; font-size: 14px; margin-bottom: 8px; font-weight: 500; }
        .form-input, .form-textarea {
            width: 100%;
            padding: 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.2s;
            font-family: inherit;
        }
        .form-input:focus, .form-textarea:focus { border-color: #667eea; background: rgba(255,255,255,0.08); }
        .form-textarea { min-height: 100px; resize: vertical; }

        .save-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s, transform 0.2s;
        }
        .save-btn:hover { opacity: 0.9; transform: translateY(-2px); }

        /* Photo Viewer */
        .viewer-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.98);
            z-index: 200;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .viewer-overlay.active { display: flex; }
        .viewer-img {
            max-width: 90%;
            max-height: 75vh;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 5px 30px rgba(0,0,0,0.5);
        }
        .viewer-controls {
            display: flex; gap: 20px; margin-top: 25px; align-items: center;
        }
        .viewer-btn {
            padding: 12px 24px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-size: 15px;
            transition: 0.2s;
            user-select: none;
        }
        .viewer-btn:hover { background: rgba(255,255,255,0.2); }
        .viewer-counter { color: #888; font-size: 14px; min-width: 60px; text-align: center; font-weight: 500; }
        .close-viewer {
            position: absolute; top: 20px; right: 20px; background: none; border: none;
            color: #fff; font-size: 40px; cursor: pointer; padding: 10px; transition: 0.2s;
        }
        .close-viewer:hover { color: #667eea; }

        @media (max-width: 600px) {
            .profile-top { flex-direction: column; align-items: center; text-align: center; }
            .name-section { align-items: center; padding-top: 0; }
            .modal-content { padding: 25px 20px; }
            .carousel-container { max-height: 220px; }
            .carousel-slide .slide-initials { font-size: 60px; }
            .carousel-actions { gap: 16px; }
        }
    </style>
    <main class="main-content">
        <div class="profile-top">
            <div class="avatar-section">
                <div class="user-avatar" id="mainAvatar" onclick="openViewerFromProfile()">
                    <span class="avatar-initials" id="avatarInitials">Г</span>
                    <img id="avatarImg" src="" alt="Avatar">
                </div>
                <div class="online-status">В сети</div>
            </div>

            <div class="name-section">
                <h1 class="user-name-large" id="displayName">Имя Фамилия</h1>
                <button class="edit-btn" type="button" onclick="openEditModal()">
                    <svg class="edit-icon" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                    Редактировать профиль
                </button>
            </div>
        </div>

        <div class="info-section">
            <div class="compact-card">
                <div class="compact-row">
                    <span class="compact-label">мобильный</span>
                    <span class="compact-value" id="displayPhone">+7 800-555-35-35</span>
                </div>
                <div class="compact-row">
                    <span class="compact-label">имя пользователя</span>
                    <span class="compact-value" id="displayUsername">@gasvs</span>
                </div>
                <div class="compact-row">
                    <span class="compact-label">почта</span>
                    <span class="compact-value" id="displayEmail">sdfsdf@mail.ru</span>
                </div>
                <div class="compact-row">
                    <span class="compact-label">день рождения</span>
                    <span class="compact-value white" id="displayBirthday">10 май 2007 (18 лет)</span>
                </div>
            </div>

            <div class="about-card" id="aboutCard">
                <div class="about-label">о себе</div>
                <div class="about-text" id="displayAbout"></div>
            </div>
        </div>
    </main>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Редактирование профиля</h2>
                <button class="close-modal" onclick="closeEditModal()">&times;</button>
            </div>

            <!-- Photo Carousel - Telegram Style -->
            <div class="photo-carousel">
                <div class="carousel-container" id="carouselContainer">
                    <!-- Slides generated by JS -->
                </div>
                <div class="carousel-actions">
                    <button class="carousel-action-btn" onclick="document.getElementById('avatarInput').click()">
                        <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                        Выбрать фотографию
                    </button>
                    <button class="carousel-action-btn danger" id="deletePhotoBtn" onclick="deleteCurrentPhoto()" style="display:none;">
                        <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                        Удалить
                    </button>
                </div>
            </div>

            <input type="file" id="avatarInput" accept="image/*" multiple>
            <input type="file" id="galleryInput" accept="image/*" multiple>

            <div class="form-group">
                <label class="form-label">Имя</label>
                <input type="text" class="form-input" id="editFirstName">
            </div>
            <div class="form-group">
                <label class="form-label">Фамилия</label>
                <input type="text" class="form-input" id="editLastName">
            </div>
            <div class="form-group">
                <label class="form-label">О себе</label>
                <textarea class="form-textarea" id="editAbout" placeholder="Расскажите о себе..."></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">Телефон</label>
                <input type="tel" class="form-input" id="editPhone">
            </div>
            <div class="form-group">
                <label class="form-label">Имя пользователя</label>
                <input type="text" class="form-input" id="editUsername">
            </div>
            <div class="form-group">
                <label class="form-label">Почта</label>
                <input type="email" class="form-input" id="editEmail">
            </div>
            <div class="form-group">
                <label class="form-label">Дата рождения</label>
                <input type="date" class="form-input" id="editBirthday">
            </div>

            <button class="save-btn" onclick="saveProfile()">Сохранить изменения</button>
        </div>
    </div>

    <!-- Photo Viewer -->
    <div class="viewer-overlay" id="photoViewer">
        <button class="close-viewer" onclick="closeViewer()">&times;</button>
        <img class="viewer-img" id="viewerImage" src="" alt="Photo">
        <div class="viewer-controls">
            <button class="viewer-btn" onclick="changePhoto(-1)">← Назад</button>
            <span class="viewer-counter" id="viewerCounter">1 / 1</span>
            <button class="viewer-btn" onclick="changePhoto(1)">Вперёд →</button>
        </div>
    </div>

    <script>
        let userData = {
            firstName: {{ (user["first_name"] or "")|tojson }},
            lastName: {{ (user["last_name"] or "")|tojson }},
            about: '',
            phone: {{ (user["phone"] or "")|tojson }},
            username: {{ (user["username"] or "")|tojson }},
            email: {{ (user["email"] or "")|tojson }},
            birthday: {{ (user["birth_date"] or "")|tojson }},
            avatar: null,
            photos: []
        };
        const profileStorageKey = `keepy_profile_data_${userData.username || 'guest'}`;

        let allViewablePhotos = [];
        let currentPhotoIndex = 0;
        let carouselIndex = 0;
        let container;

        document.addEventListener('DOMContentLoaded', () => {
            loadFromStorage();
            renderProfile();
            container = document.getElementById('carouselContainer');
            setupEventListeners();
        });

        function loadFromStorage() {
            try {
                const saved = localStorage.getItem(profileStorageKey);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    userData = {
                        ...userData,
                        about: parsed.about || '',
                        avatar: parsed.avatar || null,
                        photos: Array.isArray(parsed.photos) ? parsed.photos : []
                    };
                }
            } catch (e) { console.warn('Failed to load profile'); }
        }

        function saveToStorage() {
            const toStore = {
                about: userData.about || '',
                avatar: userData.avatar || null,
                photos: Array.isArray(userData.photos) ? userData.photos : []
            };
            try { localStorage.setItem(profileStorageKey, JSON.stringify(toStore)); }
            catch (e) { alert('Не удалось сохранить. Изображения слишком большие.'); }
        }

        function renderProfile() {
            const initialsSource = (userData.firstName || userData.username || "K");
            const initials = initialsSource.charAt(0).toUpperCase();
            document.getElementById('avatarInitials').textContent = initials;

            const avatarEl = document.getElementById('mainAvatar');
            const avatarImg = document.getElementById('avatarImg');
            if (userData.avatar) {
                avatarEl.classList.add('has-img');
                avatarImg.src = userData.avatar;
            } else {
                avatarEl.classList.remove('has-img');
            }

            const profileDisplayName = `${userData.firstName} ${userData.lastName}`.trim() || userData.username || "Пользователь";
            document.getElementById('displayName').textContent = profileDisplayName;
            document.getElementById('displayPhone').textContent = userData.phone || 'Не указан';
            document.getElementById('displayUsername').textContent = userData.username || 'Не указан';
            document.getElementById('displayEmail').textContent = userData.email || 'Не указан';
            document.getElementById('displayBirthday').textContent = userData.birthday ? formatDate(userData.birthday) : 'Не указан';

            const aboutCard = document.getElementById('aboutCard');
            if (userData.about && userData.about.trim()) {
                aboutCard.classList.add('visible');
                document.getElementById('displayAbout').textContent = userData.about;
            } else {
                aboutCard.classList.remove('visible');
            }

            document.getElementById('editFirstName').value = userData.firstName;
            document.getElementById('editLastName').value = userData.lastName;
            document.getElementById('editAbout').value = userData.about || '';
            document.getElementById('editPhone').value = userData.phone || '';
            document.getElementById('editUsername').value = userData.username || '';
            document.getElementById('editEmail').value = userData.email || '';
            document.getElementById('editBirthday').value = userData.birthday || '';

            renderCarousel();
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            const months = ['янв', 'фев', 'мар', 'апр', 'май', 'июн', 'июл', 'авг', 'сен', 'окт', 'ноя', 'дек'];
            const age = new Date().getFullYear() - d.getFullYear();
            return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()} (${age} лет)`;
        }

        // ========== CAROUSEL ==========
        function getAllPhotos() {
            const photos = [];
            if (userData.avatar) photos.push({ src: userData.avatar, type: 'avatar' });
            if (userData.photos) userData.photos.forEach(p => photos.push({ src: p, type: 'gallery' }));
            return photos;
        }

        function renderCarousel() {
            container = document.getElementById('carouselContainer');
            const allPhotos = getAllPhotos();
            container.innerHTML = '';

            if (allPhotos.length === 0) {
                const initials = userData.firstName.charAt(0).toUpperCase();
                container.innerHTML = `
                    <div class="carousel-slide">
                        <span class="slide-initials">${initials}</span>
                    </div>`;
                document.getElementById('deletePhotoBtn').style.display = 'none';
                return;
            }

            carouselIndex = Math.min(carouselIndex, allPhotos.length - 1);
            if (carouselIndex < 0) carouselIndex = 0;

            allPhotos.forEach((photo, index) => {
                const slide = document.createElement('div');
                slide.className = 'carousel-slide' + (index === carouselIndex ? '' : ' hidden');
                slide.innerHTML = `<img src="${photo.src}" alt="Photo">`;
                container.appendChild(slide);
            });

            if (allPhotos.length > 1) {
                const leftArrow = document.createElement('button');
                leftArrow.className = 'carousel-arrow left';
                leftArrow.innerHTML = '‹';
                leftArrow.onclick = (e) => { e.stopPropagation(); moveCarousel(-1); };
                container.appendChild(leftArrow);

                const rightArrow = document.createElement('button');
                rightArrow.className = 'carousel-arrow right';
                rightArrow.innerHTML = '›';
                rightArrow.onclick = (e) => { e.stopPropagation(); moveCarousel(1); };
                container.appendChild(rightArrow);

                const counter = document.createElement('div');
                counter.className = 'carousel-counter';
                counter.id = 'carouselCounter';
                counter.textContent = `${carouselIndex + 1} / ${allPhotos.length}`;
                container.appendChild(counter);
            }

            document.getElementById('deletePhotoBtn').style.display = 'flex';
        }

        function moveCarousel(direction) {
            const allPhotos = getAllPhotos();
            if (allPhotos.length <= 1) return;

            const slides = container.querySelectorAll('.carousel-slide');
            const counter = document.getElementById('carouselCounter');

            carouselIndex += direction;
            if (carouselIndex < 0) carouselIndex = allPhotos.length - 1;
            if (carouselIndex >= allPhotos.length) carouselIndex = 0;

            slides.forEach((slide, i) => {
                slide.className = 'carousel-slide' + (i === carouselIndex ? '' : ' hidden');
            });

            if (counter) counter.textContent = `${carouselIndex + 1} / ${allPhotos.length}`;
        }

        function deleteCurrentPhoto() {
            const allPhotos = getAllPhotos();
            if (allPhotos.length === 0) return;

            const current = allPhotos[carouselIndex];
            if (current.type === 'avatar') {
                userData.avatar = userData.photos?.length ? userData.photos.shift() : null;
            } else {
                const idx = userData.photos.indexOf(current.src);
                if (idx !== -1) userData.photos.splice(idx, 1);
            }

            if (carouselIndex >= allPhotos.length - 1) carouselIndex = Math.max(0, allPhotos.length - 2);

            saveToStorage();
            renderCarousel();
            renderProfile();
        }
        // ================================

        function setupEventListeners() {
            document.getElementById('avatarInput').addEventListener('change', (e) => {
                handleImageUpload(e.target.files);
                e.target.value = '';
            });

            document.getElementById('galleryInput').addEventListener('change', (e) => {
                handleImageUpload(e.target.files);
                e.target.value = '';
            });

            document.getElementById('editModal').addEventListener('click', (e) => {
                if (e.target === e.currentTarget) closeEditModal();
            });
            document.getElementById('photoViewer').addEventListener('click', (e) => {
                if (e.target === e.currentTarget) closeViewer();
            });

            let touchStartX = 0;
            const viewer = document.getElementById('photoViewer');
            viewer.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX);
            viewer.addEventListener('touchend', e => {
                const diff = touchStartX - e.changedTouches[0].screenX;
                if (Math.abs(diff) > 50) changePhoto(diff > 0 ? 1 : -1);
            });

            let carouselTouchX = 0;
            if (container) {
                container.addEventListener('touchstart', e => carouselTouchX = e.changedTouches[0].screenX);
                container.addEventListener('touchend', e => {
                    const diff = carouselTouchX - e.changedTouches[0].screenX;
                    if (Math.abs(diff) > 50) moveCarousel(diff > 0 ? 1 : -1);
                });
            }
        }

        // ✅ ИЗМЕНЕНО: Новая фотография всегда становится аватаром
        function handleImageUpload(files) {
            if (!files || files.length === 0) return;

            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const newSrc = e.target.result;
                    // Если уже есть аватар, сохраняем его в галерею
                    if (userData.avatar) {
                        if (!userData.photos) userData.photos = [];
                        userData.photos.unshift(userData.avatar);
                    }
                    // Новая фотка сразу становится аватаром
                    userData.avatar = newSrc;

                    saveToStorage();
                    renderCarousel();
                    renderProfile();
                };
                reader.readAsDataURL(file);
            });
        }

        // ===== ГЛОБАЛЬНЫЕ ФУНКЦИИ ДЛЯ КНОПОК =====

        window.openEditModal = function() {
            carouselIndex = 0;
            renderCarousel();
            const modal = document.getElementById('editModal');
            modal.classList.add('active');
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        window.closeEditModal = function() {
            const modal = document.getElementById('editModal');
            modal.classList.remove('active');
            modal.style.display = '';
            document.body.style.overflow = '';
        }

        window.openViewerFromProfile = function() {
            openViewer(0);
        }

        function saveProfile() {
            userData.firstName = document.getElementById('editFirstName').value.trim();
            userData.lastName = document.getElementById('editLastName').value.trim();
            userData.about = document.getElementById('editAbout').value.trim();
            userData.phone = document.getElementById('editPhone').value.trim();
            userData.username = document.getElementById('editUsername').value.trim();
            userData.email = document.getElementById('editEmail').value.trim();
            userData.birthday = document.getElementById('editBirthday').value;

            saveToStorage();
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = '{{ url_for("profile") }}';

            const fields = {
                username: userData.username,
                first_name: userData.firstName,
                last_name: userData.lastName,
                phone: userData.phone,
                email: userData.email,
                birth_date: userData.birthday
            };

            Object.entries(fields).forEach(([name, value]) => {
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = name;
                input.value = value || '';
                form.appendChild(input);
            });

            document.body.appendChild(form);
            form.submit();
        }

        // Photo Viewer
        function prepareViewerData() {
            allViewablePhotos = [];
            if (userData.avatar) allViewablePhotos.push(userData.avatar);
            if (userData.photos) allViewablePhotos = allViewablePhotos.concat(userData.photos);
        }

        function openViewer(startIndex = 0) {
            prepareViewerData();
            if (allViewablePhotos.length === 0) return;

            currentPhotoIndex = Math.max(0, Math.min(startIndex, allViewablePhotos.length - 1));
            updateViewerUI();
            document.getElementById('photoViewer').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        window.closeViewer = function() {
            document.getElementById('photoViewer').classList.remove('active');
            document.body.style.overflow = '';
        }

        function changePhoto(direction) {
            if (allViewablePhotos.length <= 1) return;
            currentPhotoIndex += direction;
            if (currentPhotoIndex < 0) currentPhotoIndex = allViewablePhotos.length - 1;
            if (currentPhotoIndex >= allViewablePhotos.length) currentPhotoIndex = 0;
            updateViewerUI();
        }

        function updateViewerUI() {
            document.getElementById('viewerImage').src = allViewablePhotos[currentPhotoIndex];
            document.getElementById('viewerCounter').textContent = `${currentPhotoIndex + 1} / ${allViewablePhotos.length}`;
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('photoViewer').classList.contains('active')) {
                if (e.key === 'ArrowLeft') changePhoto(-1);
                if (e.key === 'ArrowRight') changePhoto(1);
                if (e.key === 'Escape') closeViewer();
            }
            if (document.getElementById('editModal').classList.contains('active')) {
                if (e.key === 'Escape') closeEditModal();
            }
        });
    </script>
{% endblock %}
